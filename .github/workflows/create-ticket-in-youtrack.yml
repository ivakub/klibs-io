name: Create YouTrack issue from GitHub issue

on:
  issues:
    types: [opened]

jobs:
  create-youtrack-issue:
    runs-on: ubuntu-latest
    env:
      YT_BASE_URL: https://youtrack.jetbrains.com
      YT_PROJECT: ${{ secrets.YT_PROJECT }}
      YT_SUBSYSTEM: ${{ secrets.YT_SUBSYSTEM }}
      YT_TOKEN: ${{ secrets.YT_TOKEN }}
      GH_ISSUE_TITLE: ${{ github.event.issue.title }}
      GH_ISSUE_BODY: ${{ github.event.issue.body }}
      GH_ISSUE_URL: ${{ github.event.issue.html_url }}
      GH_ISSUE_USER: ${{ github.event.issue.user.login }}
    steps:
      - name: Create YouTrack issue
        run: |
          set -euo pipefail
          DESCRIPTION=$(printf '%s\n\n---\nReported from GitHub: %s\nAuthor: @%s' \
            "${GH_ISSUE_BODY:-(no description)}" "${GH_ISSUE_URL}" "${GH_ISSUE_USER}")

          PAYLOAD=$(jq -n \
            --arg project "${YT_PROJECT}" \
            --arg summary "${GH_ISSUE_TITLE}" \
            --arg description "${DESCRIPTION}" \
            --arg subsystem "${YT_SUBSYSTEM}" \
            '{
              project: { id: $project },
              summary: $summary,
              description: $description,
              customFields: [
                {
                  name: "Subsystem",
                  "$type": "SingleEnumIssueCustomField",
                  value: { name: $subsystem }
                }
              ]
            }')

          HTTP_CODE=$(curl -sS -o /tmp/yt-response.json -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${YT_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            "${YT_BASE_URL}/api/issues?fields=id,idReadable" \
            -d "${PAYLOAD}")

          echo "HTTP ${HTTP_CODE}"
          cat /tmp/yt-response.json
          echo

          if [ "${HTTP_CODE}" != "200" ] && [ "${HTTP_CODE}" != "201" ]; then
            exit 1
          fi

          YT_ID=$(jq -r '.idReadable' /tmp/yt-response.json)
          echo "Created YouTrack issue: ${YT_BASE_URL}/issue/${YT_ID}"
