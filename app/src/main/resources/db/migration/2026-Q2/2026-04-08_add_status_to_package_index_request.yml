databaseChangeLog:
  - changeSet:
      id: add status column to package_index_request table
      author: dmitrii.krasnov@jetbrains.com
      preConditions:
        - onFail: MARK_RAN
        - not:
            columnExists:
              tableName: package_index_request
              columnName: status
      changes:
        - addColumn:
            tableName: package_index_request
            columns:
              - column:
                  name: status
                  type: varchar(20)
                  defaultValue: "PENDING"
                  constraints:
                    nullable: false
